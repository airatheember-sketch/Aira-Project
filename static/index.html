<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>AIRA — Your Companion</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            --accent-cyan: #22d3ee;
            --accent-indigo: #818cf8;
            --accent-glow: rgba(34, 211, 238, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --orb-idle: rgba(34, 211, 238, 0.3);
            --orb-listening: rgba(129, 140, 248, 0.5);
            --orb-thinking: rgba(245, 158, 11, 0.4);
            --orb-speaking: rgba(16, 185, 129, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(129, 140, 248, 0.03) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            height: 100vh;
            gap: 1px;
            background: rgba(0, 0, 0, 0.2);
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel:last-child { border-right: none; border-left: 1px solid var(--glass-border); }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse-status 2s ease-in-out infinite;
        }

        @keyframes pulse-status { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .transcript-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transcript-list::-webkit-scrollbar { width: 4px; }
        .transcript-list::-webkit-scrollbar-track { background: transparent; }
        .transcript-list::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 90%;
            font-size: 13px;
            line-height: 1.5;
            animation: message-in 0.3s ease-out;
        }

        @keyframes message-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bubble.aira {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.2);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-bubble.you {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-time { font-size: 10px; color: var(--text-muted); margin-top: 6px; font-family: 'Rajdhani', sans-serif; }

        .center-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .orb-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .orb {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent 50%),
                        radial-gradient(circle at 50% 50%, var(--orb-idle), transparent 70%),
                        linear-gradient(135deg, var(--accent-cyan), var(--accent-indigo));
            box-shadow: 0 0 60px var(--accent-glow), 0 0 120px rgba(34, 211, 238, 0.2), inset 0 0 60px rgba(255, 255, 255, 0.1);
            position: relative;
            transform: translateZ(0);
            will-change: transform, box-shadow;
        }

        .orb.state-idle { animation: breathe-idle 4s ease-in-out infinite; }
        .orb.state-listening {
            animation: breathe-listening 2s ease-in-out infinite;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent 50%),
                        radial-gradient(circle at 50% 50%, var(--orb-listening), transparent 70%),
                        linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
        }
        .orb.state-thinking {
            animation: pulse-thinking 1s ease-in-out infinite;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent 50%),
                        radial-gradient(circle at 50% 50%, var(--orb-thinking), transparent 70%),
                        linear-gradient(135deg, var(--warning), var(--accent-cyan));
        }
        .orb.state-speaking {
            animation: glow-speaking 0.5s ease-in-out infinite alternate;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent 50%),
                        radial-gradient(circle at 50% 50%, var(--orb-speaking), transparent 70%),
                        linear-gradient(135deg, var(--success), var(--accent-cyan));
        }

        @keyframes breathe-idle {
            0%, 100% { transform: scale(1) translateZ(0); box-shadow: 0 0 60px var(--accent-glow), 0 0 120px rgba(34, 211, 238, 0.2), inset 0 0 60px rgba(255, 255, 255, 0.1); }
            50% { transform: scale(1.05) translateZ(0); box-shadow: 0 0 80px var(--accent-glow), 0 0 160px rgba(34, 211, 238, 0.3), inset 0 0 80px rgba(255, 255, 255, 0.15); }
        }

        @keyframes breathe-listening {
            0%, 100% { transform: scale(1.1) translateZ(0); box-shadow: 0 0 80px var(--accent-indigo), 0 0 160px rgba(129, 140, 248, 0.4); }
            50% { transform: scale(1.2) translateZ(0); box-shadow: 0 0 100px var(--accent-indigo), 0 0 200px rgba(129, 140, 248, 0.5); }
        }

        @keyframes pulse-thinking {
            0%, 100% { transform: scale(1) translateZ(0); opacity: 0.8; }
            50% { transform: scale(0.95) translateZ(0); opacity: 1; }
        }

        @keyframes glow-speaking {
            from { box-shadow: 0 0 60px var(--success), 0 0 120px rgba(16, 185, 129, 0.3); }
            to { box-shadow: 0 0 100px var(--success), 0 0 200px rgba(16, 185, 129, 0.5); }
        }

        .orb-ring { position: absolute; border: 1px solid rgba(34, 211, 238, 0.1); border-radius: 50%; pointer-events: none; }
        .orb-ring:nth-child(1) { width: 220px; height: 220px; animation: rotate 20s linear infinite; }
        .orb-ring:nth-child(2) { width: 260px; height: 260px; animation: rotate 25s linear infinite reverse; }
        .orb-ring:nth-child(3) { width: 300px; height: 300px; animation: rotate 30s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .state-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 20px;
            opacity: 0.8;
        }

        .artbox {
            width: 100%;
            max-width: 600px;
            height: 200px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .artbox-content { width: 100%; height: 100%; display: none; }
        .artbox-content.active { display: block; }
        .artbox img { width: 100%; height: 100%; object-fit: contain; background: rgba(0, 0, 0, 0.3); }

        .updates-list { flex: 1; overflow-y: auto; padding: 16px; }

        .update-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--glass-highlight);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .update-item:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(34, 211, 238, 0.3); }
        .update-time { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: var(--accent-cyan); margin-bottom: 4px; }

        .privacy-controls {
            padding: 16px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 8px 12px;
            background: var(--glass-highlight);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 11px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-btn:hover { background: rgba(34, 211, 238, 0.1); border-color: var(--accent-cyan); color: var(--text-primary); }
        .control-btn.active { background: rgba(34, 211, 238, 0.2); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .control-btn.danger { color: var(--danger); }
        .control-btn.danger:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); }

        .bottom-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .dock-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-highlight);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .dock-btn:hover { background: rgba(34, 211, 238, 0.1); border-color: var(--accent-cyan); color: var(--accent-cyan); transform: translateY(-2px); }
        .dock-btn.active { background: var(--accent-cyan); color: #0f172a; border-color: var(--accent-cyan); }
        .dock-btn svg { width: 20px; height: 20px; }

        .input-container {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            display: none;
            z-index: 99;
        }

        .input-container.active { display: block; animation: slide-up 0.3s ease-out; }

        @keyframes slide-up {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .chat-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            backdrop-filter: blur(20px);
        }

        .chat-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1); }
        .chat-input::placeholder { color: var(--text-muted); }

        .wake-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .wake-overlay.hidden { opacity: 0; pointer-events: none; }

        .wake-btn {
            padding: 20px 48px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-indigo));
            border: none;
            border-radius: 16px;
            color: #0f172a;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            box-shadow: 0 0 40px var(--accent-glow);
            transition: all 0.3s;
        }

        .wake-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px var(--accent-glow); }

        .wake-text { margin-top: 24px; color: var(--text-secondary); font-size: 14px; letter-spacing: 0.05em; }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-overlay.hidden { display: none; }

        .login-form {
            width: 90%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-input {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .login-input:focus { border-color: var(--accent-cyan); }

        .login-btn {
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-indigo));
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--accent-glow); }

        .login-error {
            color: var(--danger);
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .login-error.visible { display: block; }

        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; }
            .panel:not(.center-panel) { display: none; position: fixed; top: 0; width: 80%; height: 100%; z-index: 200; background: rgba(15, 23, 42, 0.95); }
            .panel.left-panel.active { display: flex; left: 0; animation: slide-in-left 0.3s ease-out; }
            .panel.right-panel.active { display: flex; right: 0; animation: slide-in-right 0.3s ease-out; }
            @keyframes slide-in-left { from { transform: translateX(-100%); } to { transform: translateX(0); } }
            @keyframes slide-in-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
            .orb-container { width: 200px; height: 200px; }
            .orb { width: 120px; height: 120px; }
            .mobile-toggle { display: flex !important; }
        }

        @media (min-width: 1025px) { .mobile-toggle { display: none !important; } }

        .mobile-toggle {
            position: fixed;
            top: 20px;
            padding: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-secondary);
            z-index: 150;
            cursor: pointer;
        }

        .mobile-toggle.left { left: 20px; }
        .mobile-toggle.right { right: 20px; }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 500;
            pointer-events: none;
        }

        .toast {
            padding: 12px 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 13px;
            animation: toast-in 0.3s ease-out;
            pointer-events: auto;
            max-width: 300px;
        }

        @keyframes toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        .toast.warning { border-color: var(--warning); }

        .connection-status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 11px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .connection-status.connected { border-color: var(--success); color: var(--success); }
        .connection-status.disconnected { border-color: var(--danger); color: var(--danger); }
        .connection-status.connecting { border-color: var(--warning); color: var(--warning); }

        .screen-preview {
            position: fixed;
            bottom: 110px;
            right: 20px;
            width: 200px;
            height: 120px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            z-index: 90;
        }

        .screen-preview.active { display: block; }
        .screen-preview img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .screen-preview-label { position: absolute; bottom: 8px; left: 8px; font-size: 10px; color: var(--accent-cyan); font-family: 'Rajdhani', sans-serif; letter-spacing: 0.1em; }
    </style>
</head>
<body>

            <button class="login-btn" onclick="login()">Connect</button>
        </div>
    </div>

    <div class="wake-overlay hidden" id="wakeOverlay">
        <button class="wake-btn" onclick="wakeUp()">Wake up</button>
        <div class="wake-text">Tap to initialize AIRA</div>

        </svg>
    </button>

    <div class="toast-container" id="toastContainer"></div>

    <div class="screen-preview" id="screenPreview">
        <img id="screenPreviewImg" src="" alt="Screen">
        <div class="screen-preview-label">LIVE</div>
    </div>

    <div class="app-container">

            <div class="panel-header">
                <span class="panel-title">Conversation</span>
                <div class="status-indicator"></div>
            </div>

                <div class="message-bubble aira">
                    <div>I'm here. What are we working on today?</div>
                    <div class="message-time">Just now</div>

        <div class="panel center-panel">
            <div class="orb-container">
                <div class="orb-ring"></div>
                <div class="orb-ring"></div>
                <div class="orb-ring"></div>
                <div class="orb state-idle" id="mainOrb"></div>
            </div>
            <div class="state-label" id="stateLabel">Idle</div>
            
            <div class="artbox" id="artbox">
                <div class="artbox-placeholder">Visual context will appear here</div>
                <div class="artbox-content" id="artboxContent">
                    <canvas id="mainCanvas"></canvas>
                </div>
            </div>
        </div>

        <div class="panel right-panel" id="rightPanel">
            <div class="panel-header">
                <span class="panel-title">Updates</span>
                <button class="control-btn" onclick="refreshUpdates()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </button>
            </div>
            <div class="updates-list" id="updatesList">
                <div class="update-item">
                    <div class="update-time">SYSTEM</div>
                    <div>AIRA initialized and ready</div>
                </div>
                <div class="update-item">
                    <div class="update-time">MEMORY</div>
                    <div>Loaded 3 previous sessions</div>
                </div>
            </div>
            
            <div class="privacy-controls">
                <button class="control-btn" id="cameraBtn" onclick="toggleCamera()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    Camera
                </button>
                <button class="control-btn" id="visionBtn" onclick="toggleVision()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    Screen
                </button>
                <button class="control-btn" id="privacyBtn" onclick="togglePrivacy()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Privacy
                </button>
                <button class="control-btn danger" onclick="clearContext()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    Clear
                </button>
            </div>
        </div>
    </div>

    <div class="input-container" id="inputContainer">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
    </div>

    <div class="bottom-dock">
        <button class="dock-btn" id="micBtn" onclick="toggleMic()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
        <button class="dock-btn" id="keyboardBtn" onclick="toggleKeyboard()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                <line x1="6" y1="8" x2="6" y2="8"></line>
                <line x1="10" y1="8" x2="10" y2="8"></line>
                <line x1="14" y1="8" x2="14" y2="8"></line>
                <line x1="18" y1="8" x2="18" y2="8"></line>
                <line x1="6" y1="12" x2="6" y2="12"></line>
                <line x1="10" y1="12" x2="10" y2="12"></line>
                <line x1="14" y1="12" x2="14" y2="12"></line>
                <line x1="18" y1="12" x2="18" y2="12"></line>
                <line x1="6" y1="16" x2="18" y2="16"></line>
            </svg>
        </button>
        <button class="dock-btn" onclick="toggleHistory()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        </button>
        <button class="dock-btn" onclick="refreshAll()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </button>
    </div>

    <script>
        let authToken = localStorage.getItem('aira_token') || '';
        
        const state = {
            isAwake: false, currentState: 'idle', isListening: false,
            isVisionActive: false, isCameraActive: false, isPrivacyMode: false,
            ws: null, messageHistory: [], reconnectAttempts: 0
        };

        const elements = {
            loginOverlay: document.getElementById('loginOverlay'),
            wakeOverlay: document.getElementById('wakeOverlay'),
            mainOrb: document.getElementById('mainOrb'),
            stateLabel: document.getElementById('stateLabel'),
            transcriptList: document.getElementById('transcriptList'),
            inputContainer: document.getElementById('inputContainer'),
            chatInput: document.getElementById('chatInput'),
            connStatus: document.getElementById('connStatus'),
            updatesList: document.getElementById('updatesList'),
            screenPreview: document.getElementById('screenPreview'),
            visionBtn: document.getElementById('visionBtn'),
            cameraBtn: document.getElementById('cameraBtn'),
            privacyBtn: document.getElementById('privacyBtn'),
            loginError: document.getElementById('loginError')
        };

        if (authToken) {
            elements.loginOverlay.classList.add('hidden');
            elements.wakeOverlay.classList.remove('hidden');
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    authToken = data.access_token;
                    localStorage.setItem('aira_token', authToken);
                    elements.loginOverlay.classList.add('hidden');
                    elements.wakeOverlay.classList.remove('hidden');
                    elements.loginError.classList.remove('visible');
                } else {
                    elements.loginError.classList.add('visible');
                }
            } catch (e) {
                elements.loginError.textContent = 'Connection failed';
                elements.loginError.classList.add('visible');
            }
        }

        function wakeUp() {
            state.isAwake = true;
            elements.wakeOverlay.classList.add('hidden');
            connectWebSocket();
            showToast('AIRA is awake', 'success');
            addUpdate('SYSTEM', 'AIRA initialized');
        }

        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws/chat?token=${authToken}`;
            elements.connStatus.className = 'connection-status connecting';
            elements.connStatus.innerHTML = '<span class="status-indicator"></span><span>Connecting...</span>';
            
            try {
                state.ws = new WebSocket(wsUrl);
                
                state.ws.onopen = () => {
                    state.reconnectAttempts = 0;
                    elements.connStatus.className = 'connection-status connected';
                    elements.connStatus.innerHTML = '<span class="status-indicator"></span><span>Connected</span>';
                    showToast('Connected to AIRA', 'success');
                };

                state.ws.onmessage = (event) => { handleWebSocketMessage(event.data); };
                
                state.ws.onclose = () => {
                    elements.connStatus.className = 'connection-status disconnected';
                    elements.connStatus.innerHTML = '<span class="status-indicator"></span><span>Disconnected</span>';
                    if (state.reconnectAttempts < 5) {
                        setTimeout(connectWebSocket, 3000);
                        state.reconnectAttempts++;
                    }
                };
                
                state.ws.onerror = () => { showToast('Connection error', 'error'); };
            } catch (e) { showToast('Failed to connect', 'error'); }
        }

        function handleWebSocketMessage(data) {
            try {
                const msg = JSON.parse(data);
                switch(msg.type) {
                    case 'state': updateOrbState(msg.state); break;
                    case 'message': addMessage('aira', msg.content); break;
                    case 'transcript': addMessage(msg.sender, msg.text); break;
                    case 'vision': handleVisionUpdate(msg); break;
                    case 'error': showToast(msg.content, 'error'); break;
                }
            } catch (e) { addMessage('aira', data); }
        }

        function updateOrbState(newState) {
            state.currentState = newState;
            elements.mainOrb.className = `orb state-${newState}`;
            const labels = { 'idle': 'Idle', 'listening': 'Listening...', 'thinking': 'Thinking...', 'speaking': 'Speaking' };
            elements.stateLabel.textContent = labels[newState] || newState;
        }

        function toggleMic() {
            const btn = document.getElementById('micBtn');
            state.isListening = !state.isListening;
            btn.classList.toggle('active');
            if (state.isListening) { updateOrbState('listening'); showToast('Listening...', 'success'); startSpeechRecognition(); }
            else { updateOrbState('idle'); stopSpeechRecognition(); }
        }

        function toggleKeyboard() {
            elements.inputContainer.classList.toggle('active');
            if (elements.inputContainer.classList.contains('active')) setTimeout(() => elements.chatInput.focus(), 100);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                const text = elements.chatInput.value.trim();
                if (text) { sendMessage(text); elements.chatInput.value = ''; }
            }
        }

        async function sendMessage(text) {
            addMessage('you', text);
            updateOrbState('thinking');
            
            try {
                const response = await fetch('/chat/', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ message: text })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage('aira', data.response);
                } else if (response.status === 401) {
                    addMessage('aira', 'Session expired. Please login again.');
                    localStorage.removeItem('aira_token');
                    location.reload();
                } else {
                    addMessage('aira', 'Error processing message');
                }
            } catch (e) {
                addMessage('aira', 'Connection failed');
            }
            updateOrbState('idle');
        }

        function addMessage(sender, text) {
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${sender}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            bubble.innerHTML = `<div>${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
            elements.transcriptList.appendChild(bubble);
            elements.transcriptList.scrollTop = elements.transcriptList.scrollHeight;
        }

        function addUpdate(category, text) {
            const item = document.createElement('div');
            item.className = 'update-item';
            item.innerHTML = `<div class="update-time">${category}</div><div>${text}</div>`;
            elements.updatesList.insertBefore(item, elements.updatesList.firstChild);
        }

        function toggleVision() {
            state.isVisionActive = !state.isVisionActive;
            elements.visionBtn.classList.toggle('active');
            elements.screenPreview.classList.toggle('active', state.isVisionActive);
            if (state.isVisionActive) { showToast('Screen capture active', 'success'); addUpdate('VISION', 'Screen monitoring enabled'); }
            else { showToast('Screen capture paused', 'warning'); addUpdate('VISION', 'Screen monitoring disabled'); }
        }

        function toggleCamera() {
            state.isCameraActive = !state.isCameraActive;
            elements.cameraBtn.classList.toggle('active');
            showToast(state.isCameraActive ? 'Camera enabled' : 'Camera disabled', state.isCameraActive ? 'success' : 'warning');
        }

        function togglePrivacy() {
            state.isPrivacyMode = !state.isPrivacyMode;
            elements.privacyBtn.classList.toggle('active');
            showToast(state.isPrivacyMode ? 'Privacy mode ON' : 'Privacy mode OFF', state.isPrivacyMode ? 'warning' : 'success');
            if (state.isPrivacyMode && state.isVisionActive) toggleVision();
        }

        let recognition;
        function startSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true; recognition.interimResults = true;
                recognition.onresult = (event) => {
                    const transcript = Array.from(event.results).map(result => result[0]).map(result => result.transcript).join('');
                    if (event.results[0].isFinal) { sendMessage(transcript); toggleMic(); }
                };
                recognition.start();
            }
        }
        function stopSpeechRecognition() { if (recognition) recognition.stop(); }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`; toast.textContent = message;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function togglePanel(side) { document.getElementById(side + 'Panel').classList.toggle('active'); }
        
        async function clearContext() {
            if (!confirm('Clear all conversation history?')) return;
            try {
                const response = await fetch('/chat/context', { 
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (response.ok) {
                    elements.transcriptList.innerHTML = '';
                    showToast('Context cleared', 'success');
                    addUpdate('MEMORY', 'Conversation context cleared');
                } else {
                    showToast('Failed to clear context', 'error');
                }
            } catch (e) { showToast('Failed to clear context', 'error'); }
        }
        
        function refreshUpdates() { addUpdate('SYSTEM', 'Updates refreshed'); showToast('Updates refreshed', 'success'); }
        function refreshAll() { location.reload(); }
        function toggleHistory() { togglePanel('left'); }
        function handleVisionUpdate(msg) { if (msg.activity) addUpdate('SCREEN', `Detected: ${msg.activity}`); }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').then(() => console.log('SW registered')).catch(() => console.log('SW registration failed'));
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { elements.inputContainer.classList.remove('active'); document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); }
            if (e.key === ' ' && e.target === document.body) { e.preventDefault(); toggleMic(); }
        });
        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(() => {});
    </script>
</body>
</html>
