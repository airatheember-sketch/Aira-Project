<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050810">
    <title>AIRA</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #020408;
            --panel: rgba(10, 15, 30, 0.6);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --cyan: #00f0ff;
            --blue: #0080ff;
            --purple: #a855f7;
            --pink: #ec4899;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Background */
        .bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 70%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(0, 240, 255, 0.1) 0%, transparent 50%);
            z-index: 0;
        }

        /* Layout */
        .app {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 12px;
            padding: 12px;
        }

        @media (max-width: 1100px) {
            .app { grid-template-columns: 260px 1fr 300px; }
        }

        @media (max-width: 900px) {
            .app { 
                grid-template-columns: 1fr; 
                padding: 8px;
            }
            .left, .right { display: none; }
        }

        /* Panel base */
        .panel {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* LEFT COLUMN */
        .left { gap: 12px; }

        .memory-bar {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 11px;
            color: var(--muted);
        }

        .mem-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mem-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        /* Camera */
        .cam-box {
            height: 160px;
            position: relative;
            background: linear-gradient(135deg, rgba(5,8,16,0.9), rgba(15,23,42,0.5));
        }

        .cam-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            transform: scaleX(-1);
        }

        .cam-feed.active { display: block; }

        .cam-off {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--muted);
        }

        .cam-off svg {
            width: 32px;
            height: 32px;
            opacity: 0.4;
        }

        .cam-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 20px;
            color: #ef4444;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cam-btn.on {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
            color: #10b981;
        }

        .cam-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 2s infinite;
        }

        .cam-btn.on .cam-dot {
            animation: none;
            box-shadow: 0 0 8px currentColor;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* News */
        .news-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .news-tabs {
            display: flex;
            gap: 4px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        .tab {
            padding: 6px 12px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover { color: var(--text); }
        .tab.active {
            background: rgba(0, 240, 255, 0.1);
            color: var(--cyan);
        }

        .news-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .news-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--glass);
            border-radius: 10px;
            border-left: 2px solid var(--purple);
            cursor: pointer;
            transition: all 0.2s;
        }

        .news-item:hover {
            background: rgba(255,255,255,0.06);
            border-left-color: var(--cyan);
        }

        .news-title {
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-meta {
            font-size: 10px;
            color: var(--muted);
        }

        /* CENTER - The Living Orb */
        .center {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* Organic Liquid Orb */
        .orb-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 900px) {
            .orb-wrapper { width: 240px; height: 240px; }
        }

        /* Outer glow */
        .orb-glow {
            position: absolute;
            inset: -60px;
            background: radial-gradient(circle, rgba(0,240,255,0.15) 0%, transparent 70%);
            filter: blur(40px);
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* The Orb - CSS only, no canvas */
        .orb {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, transparent 25%),
                radial-gradient(circle at 70% 70%, rgba(236,72,153,0.6) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, var(--cyan) 0%, var(--blue) 40%, var(--purple) 80%);
            box-shadow: 
                0 0 60px rgba(0,240,255,0.4),
                0 0 120px rgba(168,85,247,0.2),
                inset -20px -20px 60px rgba(0,0,0,0.3),
                inset 20px 20px 60px rgba(255,255,255,0.2);
            animation: orbFloat 6s ease-in-out infinite, orbBreathe 4s ease-in-out infinite;
        }

        @media (max-width: 900px) {
            .orb { width: 160px; height: 160px; }
        }

        /* Liquid distortion effect using pseudo elements */
        .orb::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(0,240,255,0.3) 25%,
                transparent 50%,
                rgba(168,85,247,0.3) 75%,
                transparent 100%
            );
            animation: rotate 8s linear infinite;
            filter: blur(10px);
            opacity: 0.6;
        }

        .orb::after {
            content: '';
            position: absolute;
            inset: 20%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
            filter: blur(20px);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(2deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-10px) rotate(-2deg); }
        }

        @keyframes orbBreathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* Energy rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0,240,255,0.2);
        }

        .ring:nth-child(2) { width: 260px; height: 260px; animation: ringPulse 3s ease-out infinite; }
        .ring:nth-child(3) { width: 300px; height: 300px; animation: ringPulse 3s ease-out infinite 1s; opacity: 0.5; }
        .ring:nth-child(4) { width: 340px; height: 340px; animation: ringPulse 3s ease-out infinite 2s; opacity: 0.3; }

        @keyframes ringPulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* Orb states */
        .orb.thinking {
            animation: orbSpin 2s linear infinite;
        }

        .orb.speaking {
            animation: orbShake 0.3s ease-in-out infinite;
        }

        .orb.listening {
            animation: orbFloat 2s ease-in-out infinite, orbPulse 1s ease-in-out infinite;
        }

        @keyframes orbSpin {
            from { transform: rotateY(0deg) rotateX(10deg); }
            to { transform: rotateY(360deg) rotateX(10deg); }
        }

        @keyframes orbShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) scale(1.02); }
            75% { transform: translateX(5px) scale(0.98); }
        }

        @keyframes orbPulse {
            0%, 100% { box-shadow: 0 0 60px rgba(0,240,255,0.4); }
            50% { box-shadow: 0 0 100px rgba(0,240,255,0.8), 0 0 150px rgba(0,240,255,0.4); }
        }

        /* Status */
        .status {
            margin-top: 40px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .status.active { color: var(--cyan); text-shadow: 0 0 20px rgba(0,240,255,0.5); }

        /* Input */
        .input-wrap {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
        }

        .mic-badge {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 16px;
            background: rgba(0,240,255,0.1);
            border: 1px solid rgba(0,240,255,0.3);
            border-radius: 20px;
            font-size: 11px;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .mic-badge.active { opacity: 1; }

        .mic-pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--cyan);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        .input-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,240,255,0.1);
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
        }

        .input-field::placeholder { color: var(--muted); }

        .btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn:hover, .btn.active {
            background: var(--cyan);
            color: var(--bg);
        }

        /* RIGHT COLUMN */
        .right { gap: 12px; }

        .chat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .box-header {
            padding: 16px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--cyan);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 8px currentColor;
        }

        .conn-dot.online { background: #10b981; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            animation: fadeIn 0.3s;
            max-width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            background: rgba(168,85,247,0.1);
            border-left: 3px solid var(--purple);
            align-self: flex-end;
        }

        .msg.aira {
            background: rgba(0,240,255,0.08);
            border-left: 3px solid var(--cyan);
            align-self: flex-start;
        }

        .msg.system {
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            text-align: center;
        }

        .msg-time {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Visual Output Box */
        .visual-box {
            height: 180px;
            display: flex;
            flex-direction: column;
        }

        .visual-content {
            flex: 1;
            margin: 0 16px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            position: relative;
        }

        .visual-content img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .vis-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 20px;
            text-align: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    
    <div class="app">
        <!-- LEFT -->
        <div class="left">
            <div class="panel memory-bar">
                <div class="mem-row">
                    <div class="mem-dot" style="background: var(--cyan); box-shadow: 0 0 8px var(--cyan)"></div>
                    <span id="t1">Tier 1: 0 msgs</span>
                </div>
                <div class="mem-row">
                    <div class="mem-dot" style="background: var(--purple)"></div>
                    <span id="t2">Tier 2: 0 summaries</span>
                </div>
                <div class="mem-row">
                    <div class="mem-dot" style="background: var(--pink)"></div>
                    <span id="t3">Tier 3: 0 vectors</span>
                </div>
            </div>

            <div class="panel cam-box" id="camBox">
                <video class="cam-feed" id="camFeed" autoplay playsinline muted></video>
                <div class="cam-off" id="camOff">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    <span>Camera Offline</span>
                </div>
                <button class="cam-btn" id="camBtn" onclick="toggleCam()">
                    <div class="cam-dot"></div>
                    <span>OFF</span>
                </button>
            </div>

            <div class="panel news-box">
                <div class="news-tabs">
                    <button class="tab active" onclick="setTab('general', this)">World</button>
                    <button class="tab" onclick="setTab('pakistan', this)">Pakistan</button>
                    <button class="tab" onclick="setTab('tech', this)">Tech</button>
                    <button class="tab" onclick="setTab('business', this)">Business</button>
                </div>
                <div class="news-list" id="newsList">
                    <div class="news-item"><div class="news-title">Loading...</div></div>
                </div>
            </div>
        </div>

        <!-- CENTER -->
        <div class="panel center">
            <div class="orb-wrapper">
                <div class="orb-glow"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="orb" id="orb"></div>
            </div>
            
            <div class="status" id="status">IDLE</div>
            
            <div class="input-wrap">
                <div class="mic-badge active" id="micBadge">
                    <div class="mic-pulse"></div>
                    <span>Listening for "Hey Aira"</span>
                </div>
                <div class="input-box">
                    <button class="btn" id="micBtn" onclick="toggleMic()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <input type="text" class="input-field" id="input" placeholder="Type a message..." onkeypress="onKey(event)">
                    <button class="btn" onclick="send()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div class="panel chat-box">
                <div class="box-header">
                    <span>Conversation</span>
                    <div class="conn-dot" id="connDot"></div>
                </div>
                <div class="messages" id="msgs">
                    <div class="msg aira">AIRA initialized and ready<div class="msg-time">Now</div></div>
                </div>
            </div>

            <div class="panel visual-box">
                <div class="box-header">Visual Output</div>
                <div class="visual-content" id="visual">
                    <div class="vis-placeholder">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.4;">
                            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>Images & visualizations<br>appear here</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            token: localStorage.getItem('aira_token') || '',
            ws: null,
            cam: false,
            stream: null,
            recording: false,
            tts: new Audio(),
            tab: 'general'
        };

        const els = {
            orb: document.getElementById('orb'),
            status: document.getElementById('status'),
            camBox: document.getElementById('camBox'),
            camFeed: document.getElementById('camFeed'),
            camOff: document.getElementById('camOff'),
            camBtn: document.getElementById('camBtn'),
            msgs: document.getElementById('msgs'),
            input: document.getElementById('input'),
            micBtn: document.getElementById('micBtn'),
            micBadge: document.getElementById('micBadge'),
            connDot: document.getElementById('connDot'),
            newsList: document.getElementById('newsList'),
            visual: document.getElementById('visual'),
            t1: document.getElementById('t1'),
            t2: document.getElementById('t2'),
            t3: document.getElementById('t3')
        };

        // Init
        (function init() {
            if (!state.token) return login();
            setOrb('idle');
            connect();
            loadNews('general');
            updateMem();
        })();

        function setOrb(s) {
            els.orb.className = 'orb ' + s;
            const map = {idle: 'IDLE', listening: 'LISTENING', thinking: 'THINKING', speaking: 'SPEAKING'};
            els.status.textContent = map[s] || 'IDLE';
            els.status.classList.toggle('active', s !== 'idle');
        }

        // Camera
        async function toggleCam() {
            state.cam = !state.cam;
            if (state.cam) {
                try {
                    state.stream = await navigator.mediaDevices.getUserMedia({video: {width: 640, height: 480, facingMode: 'user'}});
                    els.camFeed.srcObject = state.stream;
                    els.camFeed.classList.add('active');
                    els.camOff.style.display = 'none';
                    els.camBtn.classList.add('on');
                    els.camBtn.querySelector('span').textContent = 'ON';
                    addMsg('system', 'Camera on');
                } catch(e) {
                    state.cam = false;
                    addMsg('system', 'Camera denied');
                }
            } else {
                if (state.stream) state.stream.getTracks().forEach(t => t.stop());
                els.camFeed.srcObject = null;
                els.camFeed.classList.remove('active');
                els.camOff.style.display = 'flex';
                els.camBtn.classList.remove('on');
                els.camBtn.querySelector('span').textContent = 'OFF';
                addMsg('system', 'Camera off');
            }
        }

        // WebSocket
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${proto}//${location.host}/ws/chat?token=${state.token}`;
            
            setOrb('idle');
            els.connDot.classList.remove('online');
            
            state.ws = new WebSocket(url);
            
            state.ws.onopen = () => {
                els.connDot.classList.add('online');
                addMsg('system', 'Connected');
            };
            
            state.ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'token') {
                    if (!window.buf) { window.buf = ''; setOrb('speaking'); }
                    window.buf += data.content;
                } else if (data.type === 'done') {
                    const txt = window.buf || '';
                    window.buf = '';
                    setOrb('idle');
                    if (txt) {
                        addMsg('aira', txt);
                        speak(txt);
                    }
                }
            };
            
            state.ws.onclose = () => {
                els.connDot.classList.remove('online');
                setTimeout(connect, 3000);
            };
        }

        // Messaging
        function send() {
            const txt = els.input.value.trim();
            if (!txt || !state.ws) return;
            addMsg('user', txt);
            els.input.value = '';
            setOrb('thinking');
            state.ws.send(JSON.stringify({message: txt}));
        }

        function onKey(e) { if (e.key === 'Enter') send(); }

        function addMsg(role, txt) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.innerHTML = `${txt}<div class="msg-time">${time}</div>`;
            els.msgs.appendChild(div);
            els.msgs.scrollTop = els.msgs.scrollHeight;
        }

        // TTS
        async function speak(txt) {
            try {
                const res = await fetch('/tts/speak', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${state.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({text: txt.slice(0, 200), lang: 'en'})
                });
                if (res.ok) {
                    const blob = await res.blob();
                    state.tts.src = URL.createObjectURL(blob);
                    state.tts.play();
                }
            } catch(e) { console.error('TTS fail', e); }
        }

        // Mic
        function toggleMic() {
            state.recording = !state.recording;
            els.micBtn.classList.toggle('active', state.recording);
            els.micBadge.innerHTML = state.recording ? 
                '<div class="mic-pulse"></div><span>Recording...</span>' : 
                '<div class="mic-pulse"></div><span>Listening for "Hey Aira"</span>';
            setOrb(state.recording ? 'listening' : 'idle');
        }

        // News
        function setTab(cat, btn) {
            state.tab = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            loadNews(cat);
        }

        async function loadNews(cat) {
            try {
                const res = await fetch(`/news/headlines?category=${cat}&limit=6`, {
                    headers: { 'Authorization': `Bearer ${state.token}` }
                });
                const data = await res.json();
                els.newsList.innerHTML = data.headlines.map(h => `
                    <div class="news-item" onclick="window.open('${h.link}', '_blank')">
                        <div class="news-title">${h.title}</div>
                        <div class="news-meta">${h.source} • ${h.published}</div>
                    </div>
                `).join('');
            } catch(e) {
                els.newsList.innerHTML = '<div class="news-item"><div class="news-title">Failed to load</div></div>';
            }
        }

        // Visual
        function showVisual(type, src) {
            if (type === 'img') {
                els.visual.innerHTML = `<img src="${src}" alt="visual">`;
            } else {
                els.visual.innerHTML = `<div class="vis-placeholder"><span>${src}</span></div>`;
            }
        }

        // Memory
        async function updateMem() {
            try {
                const res = await fetch('/chat/status', { headers: { 'Authorization': `Bearer ${state.token}` } });
                const d = await res.json();
                els.t1.textContent = `Tier 1: ${d.tier1_messages || 0} msgs`;
                els.t2.textContent = `Tier 2: ${d.tier2_summaries || 0} summaries`;
                els.t3.textContent = typeof d.tier3_vector === 'string' ? d.tier3_vector : `Tier 3: ${d.tier3_vector || 0} vectors`;
            } catch(e) {}
        }

        // Login
        async function login() {
            const u = prompt('Username:') || 'admin';
            const p = prompt('Password:') || 'admin';
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`
                });
                const d = await res.json();
                if (d.access_token) {
                    state.token = d.access_token;
                    localStorage.setItem('aira_token', state.token);
                    location.reload();
                } else {
                    alert('Login failed');
                    login();
                }
            } catch(e) {
                alert('Connection failed');
            }
        }

        // Periodic
        setInterval(updateMem, 10000);
        setInterval(() => { if (state.ws?.readyState !== 1) connect(); }, 5000);
    </script>
</body>
</html>
